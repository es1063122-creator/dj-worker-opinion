<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>중대재해처벌법 안전의견 접수</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #222;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 22px;
      margin: 0 0 10px;
      color: #0f3b63;
    }

    .desc {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 14px;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .photo-box {
      margin-top: 8px;
      padding: 12px;
      border: 1px dashed #aaa;
      border-radius: 12px;
      background: #fafafa;
    }

    .photo-buttons {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .photo-buttons label {
      flex: 1;
      text-align: center;
      background: #e9f2ff;
      color: #0f4c81;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
      margin: 0;
      cursor: pointer;
    }

    input[type="file"] {
      display: none;
    }

    #preview {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      margin-top: 12px;
      border-radius: 10px;
      display: none;
      background: #eee;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #0f6fc6;
      color: #fff;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .notice {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      margin-top: 14px;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      font-weight: bold;
      color: #0f4c81;
      text-align: center;
    }

    .success {
      color: #0b8a34;
    }

    .error {
      color: #d00000;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>중대재해처벌법 안전의견 접수</h1>
      <p class="desc">
        현장의 위험요인, 개선사항, 안전 관련 의견을 익명 또는 실명으로 접수할 수 있습니다.
      </p>

      <form id="reportForm">
        <label for="siteName">현장명</label>
        <input id="siteName" type="text" placeholder="예: 동진토건 ○○현장" />

        <label for="name">작성자</label>
        <input id="name" type="text" placeholder="익명 가능" />

        <label for="phone">연락처</label>
        <input id="phone" type="tel" placeholder="선택 입력" />

        <label for="category">위험유형</label>
        <select id="category">
          <option value="">선택하세요</option>
          <option value="추락위험">추락위험</option>
          <option value="끼임위험">끼임위험</option>
          <option value="장비위험">장비위험</option>
          <option value="감전위험">감전위험</option>
          <option value="붕괴위험">붕괴위험</option>
          <option value="화재폭발위험">화재폭발위험</option>
          <option value="보호구 미착용">보호구 미착용</option>
          <option value="기타">기타</option>
        </select>

        <label for="content">의견 내용</label>
        <textarea id="content" placeholder="위험 장소, 상황, 개선 요청사항을 입력하세요."></textarea>

        <label>사진 첨부</label>
        <div class="photo-box">
          <div class="photo-buttons">
            <label for="cameraInput">카메라 촬영</label>
            <label for="galleryInput">사진 불러오기</label>
          </div>

          <input id="cameraInput" type="file" accept="image/*" capture="environment" />
          <input id="galleryInput" type="file" accept="image/*" />

          <img id="preview" alt="첨부 사진 미리보기" />
        </div>

        <button id="submitBtn" type="submit">의견 제출</button>

        <div id="status" class="status"></div>

        <p class="notice">
          접수된 의견은 안전관리 목적 외 용도로 사용하지 않습니다.
          사진 첨부 시 업로드 시간이 다소 걸릴 수 있습니다.
        </p>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getStorage,
      ref,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
    import {
      getAuth,
      signInAnonymously
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    /*
      중요:
      아래 firebaseConfig는 반드시 기존 index.html에 있던 본인 Firebase 설정값으로 바꾸세요.
      지금 값은 예시입니다.
    */
    const firebaseConfig = {
      apiKey: "기존_apiKey",
      authDomain: "기존_authDomain",
      projectId: "기존_projectId",
      storageBucket: "기존_storageBucket",
      messagingSenderId: "기존_messagingSenderId",
      appId: "기존_appId"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const auth = getAuth(app);

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7NNUErtGwjm82Syu4ViRLkrDVEek7LyzRNtctHM0aTv_YcoiRlnFZbrpxOOAXRIzU/exec";

    const form = document.getElementById("reportForm");
    const submitBtn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");

    const siteNameEl = document.getElementById("siteName");
    const nameEl = document.getElementById("name");
    const phoneEl = document.getElementById("phone");
    const categoryEl = document.getElementById("category");
    const contentEl = document.getElementById("content");

    const cameraInput = document.getElementById("cameraInput");
    const galleryInput = document.getElementById("galleryInput");
    const preview = document.getElementById("preview");

    let selectedFile = null;

    async function ensureAnonymousLogin() {
      if (!auth.currentUser) {
        await signInAnonymously(auth);
      }
      return auth.currentUser;
    }

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = "status " + type;
    }

    function handleFileSelect(file) {
      selectedFile = file || null;

      if (!selectedFile) {
        preview.style.display = "none";
        preview.src = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = function (e) {
        preview.src = e.target.result;
        preview.style.display = "block";
      };
      reader.readAsDataURL(selectedFile);
    }

    cameraInput.addEventListener("change", function (e) {
      handleFileSelect(e.target.files[0]);
    });

    galleryInput.addEventListener("change", function (e) {
      handleFileSelect(e.target.files[0]);
    });

    async function uploadPhotoIfNeeded(userId) {
      if (!selectedFile) {
        return "";
      }

      const safeName = selectedFile.name.replace(/[^\w.\-가-힣]/g, "_");
      const filePath = "reports/" + userId + "/" + Date.now() + "_" + safeName;
      const storageRef = ref(storage, filePath);

      setStatus("사진 업로드 중입니다. 잠시만 기다려주세요...");

      await uploadBytes(storageRef, selectedFile);
      const downloadUrl = await getDownloadURL(storageRef);

      return downloadUrl;
    }

    async function sendMailAlert(data) {
      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });
      } catch (error) {
        console.warn("메일 알림 발송 실패:", error);
      }
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const siteName = siteNameEl.value.trim();
      const name = nameEl.value.trim();
      const phone = phoneEl.value.trim();
      const category = categoryEl.value.trim();
      const content = contentEl.value.trim();

      if (!content) {
        alert("의견 내용을 입력해주세요.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "제출 중...";
      setStatus("제출 준비 중입니다...");

      try {
        const user = await ensureAnonymousLogin();

        let photoUrl = "";
        if (selectedFile) {
          photoUrl = await uploadPhotoIfNeeded(user.uid);
        }

        setStatus("의견을 저장 중입니다...");

        const reportData = {
          siteName: siteName || "",
          name: name || "익명",
          phone: phone || "",
          category: category || "",
          content: content || "",
          photoUrl: photoUrl || "",
          uid: user.uid,
          createdAt: serverTimestamp(),
          createdAtText: new Date().toLocaleString("ko-KR", {
            timeZone: "Asia/Seoul"
          }),
          status: "접수"
        };

        await addDoc(collection(db, "reports"), reportData);

        setStatus("메일 알림을 발송 중입니다...");

        await sendMailAlert({
          siteName: siteName || "",
          name: name || "익명",
          phone: phone || "",
          category: category || "",
          content: content || "",
          photoUrl: photoUrl || ""
        });

        setStatus("의견이 정상 접수되었습니다.", "success");
        alert("의견이 접수되었습니다.");

        form.reset();
        selectedFile = null;
        preview.src = "";
        preview.style.display = "none";

      } catch (error) {
        console.error(error);
        setStatus("제출 중 오류가 발생했습니다.", "error");
        alert("제출 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "의견 제출";
      }
    });
  </script>
</body>
</html>
